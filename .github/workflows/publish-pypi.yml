name: package

on:
  pull_request:
    paths:
      - README.md
      - pyproject.toml
      - setup.cfg
      - setup.py
      - topological_adam/**
      - .github/workflows/publish-pypi.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - pyproject.toml
      - setup.cfg
      - setup.py
      - topological_adam/**
      - .github/workflows/publish-pypi.yml
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the built distribution to PyPI
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Verify V3/V4 are packaged
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel produced")
          with zipfile.ZipFile(wheels[-1]) as wheel:
              names = set(wheel.namelist())
          required = {
              "topological_adam/v3.py",
              "topological_adam/v4.py",
              "topological_adam/persistence.py",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"Missing from wheel: {missing}")
          print("Packaged:", ", ".join(sorted(required)))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
