name: joss-paper

on:
  push:
    paths:
      - paper.md
      - paper.bib
      - docs/figures/**
      - .github/workflows/joss-paper.yml
  pull_request:
    paths:
      - paper.md
      - paper.bib
      - docs/figures/**
      - .github/workflows/joss-paper.yml

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build JOSS draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper.md
      - name: Upload paper artifact
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper
          path: paper.pdf
